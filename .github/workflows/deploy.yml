name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

# Serialize deploys: two concurrent runs would race the rolling swap on the VPS
# (both starting containers and retiring "all others"). Queued runs are
# superseded — only the newest pending run survives, which is exactly right for
# deploy-latest semantics. Never cancel an IN-PROGRESS run (a half-finished
# swap must complete its health gate).
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/chanmeng666/easy-resume/web

jobs:
  # Verification gate: run the same checks as ci.yml before building/deploying.
  # The build step is intentionally omitted here — it is already exercised by the
  # Docker image build in build-and-push.
  checks:
    runs-on: ubuntu-latest

    # Harmless placeholders for modules that read env at init (e.g. Stack Auth).
    env:
      NEXT_PUBLIC_STACK_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ci-placeholder
      STACK_SECRET_SERVER_KEY: ci-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps matches the Docker build's npm ci (see ci.yml note).
        run: npm ci --legacy-peer-deps

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  build-and-push:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          # Public, build-time-inlined values only (NEXT_PUBLIC_* + Stripe price IDs).
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_STACK_PROJECT_ID=${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
            NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
            STRIPE_PRICE_CREDITS_5=${{ secrets.STRIPE_PRICE_CREDITS_5 }}
            STRIPE_PRICE_PRO_MONTHLY=${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
            STRIPE_PRICE_UNLIMITED_MONTHLY=${{ secrets.STRIPE_PRICE_UNLIMITED_MONTHLY }}
          # Real credentials via BuildKit secrets — never baked into image layers/history.
          secrets: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STACK_SECRET_SERVER_KEY=${{ secrets.STACK_SECRET_SERVER_KEY }}

  # Apply DB migrations on the GH runner (Neon is publicly reachable) BEFORE the
  # container swap. scripts/migrate.ts is idempotent raw SQL, so this runs on
  # every deploy; if it fails, `deploy` never starts and the old container keeps
  # serving — new code never meets a schema it wasn't built for.
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Apply migrations
        run: npx tsx scripts/migrate.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ env.IMAGE }}:${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_CREDITS_5: ${{ secrets.STRIPE_PRICE_CREDITS_5 }}
          STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_UNLIMITED_MONTHLY: ${{ secrets.STRIPE_PRICE_UNLIMITED_MONTHLY }}
          STACK_SECRET_SERVER_KEY: ${{ secrets.STACK_SECRET_SERVER_KEY }}
          NEXT_PUBLIC_STACK_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
          NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          envs: IMAGE_TAG,GH_TOKEN,GH_ACTOR,NEXT_PUBLIC_APP_URL,DATABASE_URL,OPENAI_API_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_CREDITS_5,STRIPE_PRICE_PRO_MONTHLY,STRIPE_PRICE_UNLIMITED_MONTHLY,STACK_SECRET_SERVER_KEY,NEXT_PUBLIC_STACK_PROJECT_ID,NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET
          script: |
            set -e

            # Login to GHCR
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull new image (old container keeps running)
            docker pull "$IMAGE_TAG"

            # Start the new container under a unique, sha-suffixed name so it runs
            # ALONGSIDE the current one. It carries the SAME Traefik labels, so
            # Traefik merges both into one service and round-robins across them —
            # that overlap IS the zero-downtime mechanism during the swap.
            SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
            NEW="web-vitex-${SHORT_SHA}"

            # If a previous run left this exact name behind, clear it first.
            docker rm -f "$NEW" 2>/dev/null || true

            docker run -d \
              --name "$NEW" \
              --network coolify \
              --restart unless-stopped \
              --memory=768m \
              --memory-swap=1g \
              --cpus=1.5 \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.vitex.rule=Host(\`vitex.org.nz\`) || Host(\`www.vitex.org.nz\`)" \
              -l "traefik.http.routers.vitex.entrypoints=https" \
              -l "traefik.http.routers.vitex.tls.certresolver=letsencrypt" \
              -l "traefik.http.services.vitex.loadbalancer.server.port=3000" \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL}" \
              -e DATABASE_URL="${DATABASE_URL}" \
              -e OPENAI_API_KEY="${OPENAI_API_KEY}" \
              -e STRIPE_SECRET_KEY="${STRIPE_SECRET_KEY}" \
              -e STRIPE_WEBHOOK_SECRET="${STRIPE_WEBHOOK_SECRET}" \
              -e STRIPE_PRICE_CREDITS_5="${STRIPE_PRICE_CREDITS_5}" \
              -e STRIPE_PRICE_PRO_MONTHLY="${STRIPE_PRICE_PRO_MONTHLY}" \
              -e STRIPE_PRICE_UNLIMITED_MONTHLY="${STRIPE_PRICE_UNLIMITED_MONTHLY}" \
              -e STACK_SECRET_SERVER_KEY="${STACK_SECRET_SERVER_KEY}" \
              -e NEXT_PUBLIC_STACK_PROJECT_ID="${NEXT_PUBLIC_STACK_PROJECT_ID}" \
              -e NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY="${NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY}" \
              -e R2_ACCOUNT_ID="${R2_ACCOUNT_ID}" \
              -e R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
              -e R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
              -e R2_BUCKET="${R2_BUCKET}" \
              "$IMAGE_TAG"

            # Health gate: wait up to ~90s for the container HEALTHCHECK to pass
            # before retiring the old one. A failed gate removes ONLY the new
            # container, so the old one keeps serving and the deploy fails loud.
            ok=0
            for i in $(seq 1 30); do
              s=$(docker inspect -f '{{.State.Health.Status}}' "$NEW" 2>/dev/null || echo starting)
              [ "$s" = "healthy" ] && ok=1 && break
              sleep 3
            done
            if [ "$ok" != "1" ]; then
              echo "::error::health gate failed for $NEW"
              docker logs --tail 100 "$NEW" || true
              docker rm -f "$NEW"
              exit 1
            fi

            # New container is healthy and already receiving traffic — retire every
            # other web-vitex* container (the legacy fixed name and any older sha names).
            for c in $(docker ps -aq --filter "name=web-vitex"); do
              n=$(docker inspect -f '{{.Name}}' "$c" | tr -d '/')
              [ "$n" = "$NEW" ] || docker rm -f "$c"
            done

            # Image hygiene (this repo only): keep newest 3 sha tags + :latest,
            # then prune dangling layers. Never touch other repos on this shared box.
            docker images --format '{{.Repository}}:{{.Tag}}' 'ghcr.io/chanmeng666/easy-resume/web' | grep -v ':latest$' | tail -n +4 | xargs -r docker rmi 2>/dev/null || true
            docker image prune -f >/dev/null 2>&1 || true

            echo "Vitex deployment complete!"
