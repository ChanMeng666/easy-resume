name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/chanmeng666/easy-resume/web

jobs:
  # Verification gate: run the same checks as ci.yml before building/deploying.
  # The build step is intentionally omitted here — it is already exercised by the
  # Docker image build in build-and-push.
  checks:
    runs-on: ubuntu-latest

    # Harmless placeholders for modules that read env at init (e.g. Stack Auth).
    env:
      NEXT_PUBLIC_STACK_PROJECT_ID: ci-placeholder
      NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ci-placeholder
      STACK_SECRET_SERVER_KEY: ci-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --legacy-peer-deps matches the Docker build's npm ci (see ci.yml note).
        run: npm ci --legacy-peer-deps

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  build-and-push:
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          # Public, build-time-inlined values only (NEXT_PUBLIC_* + Stripe price IDs).
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_STACK_PROJECT_ID=${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
            NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY=${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
            STRIPE_PRICE_CREDITS_5=${{ secrets.STRIPE_PRICE_CREDITS_5 }}
            STRIPE_PRICE_PRO_MONTHLY=${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
            STRIPE_PRICE_UNLIMITED_MONTHLY=${{ secrets.STRIPE_PRICE_UNLIMITED_MONTHLY }}
          # Real credentials via BuildKit secrets — never baked into image layers/history.
          secrets: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STACK_SECRET_SERVER_KEY=${{ secrets.STACK_SECRET_SERVER_KEY }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ env.IMAGE }}:${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_CREDITS_5: ${{ secrets.STRIPE_PRICE_CREDITS_5 }}
          STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
          STRIPE_PRICE_UNLIMITED_MONTHLY: ${{ secrets.STRIPE_PRICE_UNLIMITED_MONTHLY }}
          STACK_SECRET_SERVER_KEY: ${{ secrets.STACK_SECRET_SERVER_KEY }}
          NEXT_PUBLIC_STACK_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_STACK_PROJECT_ID }}
          NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY: ${{ secrets.NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          envs: IMAGE_TAG,GH_TOKEN,GH_ACTOR,NEXT_PUBLIC_APP_URL,DATABASE_URL,OPENAI_API_KEY,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_CREDITS_5,STRIPE_PRICE_PRO_MONTHLY,STRIPE_PRICE_UNLIMITED_MONTHLY,STACK_SECRET_SERVER_KEY,NEXT_PUBLIC_STACK_PROJECT_ID,NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET
          script: |
            set -e

            # Login to GHCR
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull new image (old container keeps running)
            docker pull "$IMAGE_TAG"

            # Stop old container gracefully
            docker stop web-vitex 2>/dev/null || true
            docker rm web-vitex 2>/dev/null || true

            # Start web with Traefik labels for reverse proxy
            docker run -d \
              --name web-vitex \
              --network coolify \
              --restart unless-stopped \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.vitex.rule=Host(\`vitex.org.nz\`) || Host(\`www.vitex.org.nz\`)" \
              -l "traefik.http.routers.vitex.entrypoints=https" \
              -l "traefik.http.routers.vitex.tls.certresolver=letsencrypt" \
              -l "traefik.http.services.vitex.loadbalancer.server.port=3000" \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL}" \
              -e DATABASE_URL="${DATABASE_URL}" \
              -e OPENAI_API_KEY="${OPENAI_API_KEY}" \
              -e STRIPE_SECRET_KEY="${STRIPE_SECRET_KEY}" \
              -e STRIPE_WEBHOOK_SECRET="${STRIPE_WEBHOOK_SECRET}" \
              -e STRIPE_PRICE_CREDITS_5="${STRIPE_PRICE_CREDITS_5}" \
              -e STRIPE_PRICE_PRO_MONTHLY="${STRIPE_PRICE_PRO_MONTHLY}" \
              -e STRIPE_PRICE_UNLIMITED_MONTHLY="${STRIPE_PRICE_UNLIMITED_MONTHLY}" \
              -e STACK_SECRET_SERVER_KEY="${STACK_SECRET_SERVER_KEY}" \
              -e NEXT_PUBLIC_STACK_PROJECT_ID="${NEXT_PUBLIC_STACK_PROJECT_ID}" \
              -e NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY="${NEXT_PUBLIC_STACK_PUBLISHABLE_CLIENT_KEY}" \
              -e R2_ACCOUNT_ID="${R2_ACCOUNT_ID}" \
              -e R2_ACCESS_KEY_ID="${R2_ACCESS_KEY_ID}" \
              -e R2_SECRET_ACCESS_KEY="${R2_SECRET_ACCESS_KEY}" \
              -e R2_BUCKET="${R2_BUCKET}" \
              "$IMAGE_TAG"

            echo "Vitex deployment complete!"
