name: Fetch container logs

# Manual ops tool: pull the tail of the production container's logs into the
# Actions run output for debugging (structured JSON lines from the app logger).
on:
  workflow_dispatch:
    inputs:
      lines:
        description: How many log lines to tail
        default: "200"

jobs:
  logs:
    runs-on: ubuntu-latest
    steps:
      - name: Tail web-vitex logs via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          # Containers are sha-named (web-vitex-<sha7>) since the health-gated
          # rolling deploy; resolve the currently running one.
          script: docker logs $(docker ps -q --filter name=web-vitex | head -1) --tail ${{ github.event.inputs.lines }} 2>&1
