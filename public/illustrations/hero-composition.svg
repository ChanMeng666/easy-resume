<svg width="1536" height="640" viewBox="0 0 1536 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
  <!-- Phantom hero: three overlapping resume sheets fanned on paper canvas.
       Palette only: paper #fdfcfe, bone #f4f2f4, lavender #e2dffe, periwinkle
       #ab9ff2, ash #e9e8ea, aubergine #3c315b, fog #86848d. Flat fills, 1px
       ash strokes, generous negative space. No gradients, no shadows. -->
  <rect width="1536" height="640" fill="#fdfcfe"/>

  <!-- Back-right accent sheet: periwinkle, gently rotated. -->
  <g transform="rotate(8 915 315)">
    <rect x="775" y="135" width="280" height="360" rx="22" fill="#ab9ff2"/>
  </g>

  <!-- Back-left sheet: bone, gently counter-rotated. -->
  <g transform="rotate(-7 620 330)">
    <rect x="480" y="150" width="280" height="360" rx="22" fill="#f4f2f4" stroke="#e9e8ea" stroke-width="1.5"/>
  </g>

  <!-- Front sheet: paper white with a typeset-resume suggestion. -->
  <g>
    <rect x="618" y="130" width="300" height="380" rx="22" fill="#fdfcfe" stroke="#e9e8ea" stroke-width="1.5"/>

    <!-- Header block: aubergine name bar + periwinkle subtitle. -->
    <rect x="650" y="172" width="132" height="16" rx="8" fill="#3c315b"/>
    <rect x="650" y="200" width="78" height="9" rx="4.5" fill="#ab9ff2"/>
    <rect x="650" y="228" width="236" height="1.5" fill="#e9e8ea"/>

    <!-- Summary lines. -->
    <rect x="650" y="248" width="236" height="7" rx="3.5" fill="#86848d"/>
    <rect x="650" y="266" width="214" height="7" rx="3.5" fill="#86848d"/>
    <rect x="650" y="284" width="192" height="7" rx="3.5" fill="#86848d"/>

    <!-- Experience section. -->
    <rect x="650" y="320" width="96" height="10" rx="5" fill="#3c315b"/>
    <rect x="650" y="344" width="236" height="7" rx="3.5" fill="#86848d"/>
    <rect x="650" y="362" width="206" height="7" rx="3.5" fill="#86848d"/>

    <!-- Second entry. -->
    <rect x="650" y="396" width="80" height="10" rx="5" fill="#3c315b"/>
    <rect x="650" y="420" width="236" height="7" rx="3.5" fill="#86848d"/>
    <rect x="650" y="438" width="168" height="7" rx="3.5" fill="#86848d"/>
  </g>
</svg>
